name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review]

jobs:
  preflight:
    uses: ./.github/workflows/preflight.yml

  lint:
    needs: preflight
    if: needs.preflight.outputs.ok == 'true' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pre-commit deps
        run: pip install '.[format]' --quiet

      - name: Run pre-commit
        run: pre-commit run --all-files

  test:
    needs: preflight
    if: needs.preflight.outputs.ok == 'true' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "**/pyproject.toml"

      - name: Install
        run: pip install -e '.[test]' --quiet

      - name: Run pytest
        run: pytest src/tests/
